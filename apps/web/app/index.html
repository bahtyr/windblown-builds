<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Windblown Gifts</title>
    <script src="data.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>Windblown Gifts Browser</h1>
    <div class="controls">
        <label for="entitySelect">Entities:</label>
        <select id="entitySelect">
            <option value="">No filter</option>
        </select>

        <label for="searchInput">Search:</label>
        <input id="searchInput" type="text" placeholder="name/category/text…"/>

        <button class="btn" id="clearBtn">Clear</button>
        <div class="count" id="count"></div>
    </div>
    <div class="deck" id="deck">
        <button class="deck-toggle" id="deckToggle" type="button" aria-expanded="false">
            Deck (0/20)
        </button>
        <div class="deck-panel" id="deckPanel">
            <div class="deck-side">
                <div class="deck-entities-title">Entities in this deck</div>
                <div class="deck-entities-list" id="deckEntities"></div>
            </div>
            <div class="deck-main">
                <div class="deck-slots" id="deckSlots"></div>
                <div class="deck-actions">
                    <button class="btn" id="copyDeckLink" type="button">Copy share link</button>
                    <div class="deck-status" id="deckStatus"></div>
                </div>
            </div>
        </div>
    </div>
</header>
<main id="sections"></main>
<script src="script.js"></script>
</body>
</html>
